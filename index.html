<!DOCTYPE html>
<html lang="pt-br">
<head>

    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/telas-maiores.css">

    <title>Login</title>
</head>
<body>
    <main>
        <header>
            <h2 id="logo"><a href="">Logo</a></h2>
            <nav id="menu">
                <ul>
                    <li>
                        <a href="#">Home</a>
                        <a href="#">Conta</a>
                        <a href="#">Notícias</a>
                        <a href="#">Sobre</a>
                    </li>
                </ul>
            </nav>
        </header>
        <section>
            <div class="imagem-login">
                <img width="300" height="300" src="imagens/pexels-pixabay-273209.jpg" alt="login"/>
            </div>
            <div class="form-login">
                <h1>Login</h1>
                <p>
                    Seja bem-vindo. Faça login para acessar a sua conta e poder configurar o seu ambiente.
                </p>
                <form action="login.php" method="post">
                    <div class="box">
                        <label for="email"><img width="30" height="30" src="https://img.icons8.com/ios-glyphs/30/user--v1.png" alt="user--v1"/></label>
                        <input type="email" name="eml" id="email" required minlength="4" placeholder="Seu nome ou ID" autocomplete="email">
                    </div>
                    <div class="box">
                        <label for="senha"><img width="24" height="24" src="https://img.icons8.com/material-rounded/24/key--v1.png" alt="key--v1"/></label>
                        <input type="password" name="passw" id="senha" required minlength="6" maxlength="12" placeholder="Sua senha">
                        <p>⎯⎯⎯⎯⎯⎯⎯⎯      ou     ⎯⎯⎯⎯⎯⎯⎯⎯</p>
                    </div>
                    <div class="redes">
                        <div class="google"><a href="https://myaccount.google.com/?utm_source=sign_in_no_continue&pli=1" target="_blank"><img width="28" height="28" src="https://img.icons8.com/?size=100&id=V5cGWnc9R4xj&format=png&color=000000" alt="google-logo"/></a></div>
                        <br>
                        <div class="fcb"><a href="https://www.facebook.com/login/?locale=pt_BR" target="_blank"><img width="28" height="28" src="https://img.icons8.com/?size=100&id=uLWV5A9vXIPu&format=png&color=000000" alt="facebook-new"/></a></div>
                        <br>
                        <div class="gth"><a href="https://mail.google.com/mail/u/0/?hl=pt-BR#inbox" target="_blank"><img width="28" height="28" src="https://img.icons8.com/?size=100&id=ZsqwnJaWUi9o&format=png&color=000000" alt="github"/></a></div>
                        <br>
                        <div class="ink"><a href="https://secure6.store.apple.com/br/shop/signIn?ssi=4AAABnp6Cey0AICBbcLJN4nQYMwWmygZNbVWn49yaS4citosJMAPPvJFMAAAAHGh0dHBzOi8vd3d3LmFwcGxlLmNvbS9ici98fHwAAgGmIE9bBMChLdiHW1IJ7VBANqOtA73cDZ6gPsjTXI6SMQ" target="_blank"><img width="28" height="27" src="https://img.icons8.com/?size=100&id=95294&format=png&color=000000" alt="linkedin"/></a>
                        </div>
                    </div>
                    <div class="entrar">
                        <button type="submit" id="btnLogin">Entrar</button>
                    </div>
                    <div class="esqueci-senha">
                        <button type="submit" id="btnCadastro">Esqueci a senha ✉</button>
                    </div>
                </form>
            </div>
        </section>
    </main>
<script type="module" src="scripts/script.js"></script>
</body>
</html>
